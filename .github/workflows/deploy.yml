name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Se ejecutará cada vez que hagas push a main
  workflow_dispatch: # Permite ejecutarlo manualmente desde la web

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Construir el proyecto
        run: npm run build # Este es el comando que compila tu TypeScript a la carpeta dist

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Subir el artefacto (carpeta dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Asegúrate de que esta es la carpeta que se genera

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
